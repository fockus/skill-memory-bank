name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov build
          pip install -e ".[codegraph,yaml]"

      - name: Setup bats
        uses: bats-core/bats-action@3.0.0
        with:
          bats-version: 1.11.0
          support-install: false
          assert-install: false
          detik-install: false
          file-install: false

      - name: Homebrew formula version invariant (fail fast on drift)
        run: python -m pytest tests/pytest/test_homebrew_formula_version.py -q

      - name: Run bats unit tests
        run: bats tests/bats/

      - name: Run bats e2e tests
        run: bats tests/e2e/

      - name: Run bats hook tests
        run: bats hooks/tests/*.bats

      - name: Run pytest with coverage
        run: |
          python -m pytest hooks/tests/ tests/pytest/ \
            -o python_files='*_test.py test_*.py' \
            --cov \
            --cov-report=term-missing \
            --cov-fail-under=85

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on scripts
        run: |
          shellcheck --version
          shellcheck -x --source-path=SCRIPTDIR scripts/*.sh
          shellcheck hooks/*.sh
          shellcheck -x --severity=error hooks/lib/*.sh adapters/*.sh install.sh

      - name: Run ruff on Python files
        run: ruff check scripts/ hooks/lib/ memory_bank_skill/ settings/ tests/pytest/
