site_name: Memory Bank
site_url: https://fockus.github.io/skill-memory-bank/docs/
repo_url: https://github.com/fockus/skill-memory-bank
repo_name: fockus/skill-memory-bank
docs_dir: docs
# MkDocs' own default output dir is "site" — that name is already the
# checked-in GitHub Pages landing directory (site/index.html, styles.css,
# app.js). Point the build elsewhere so a plain `mkdocs build` never
# clobbers the landing page; Stage 4 combines the two into one Pages
# artifact via an explicit --site-dir.
site_dir: docs_site

theme:
  name: material
  # Match the landing page typography (site/styles.css): Space Grotesk for
  # display/body, IBM Plex Mono for code. Material fetches these by name.
  font:
    text: Space Grotesk
    code: IBM Plex Mono
  icon:
    logo: material/brain
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

# Brand overlay — palette/typography/shape tuned to the landing page.
# Custom primary/accent colors live here (Material has no named "lime").
extra_css:
  - assets/brand.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

# Existing docs/*.md were authored for GitHub-blob rendering and legitimately
# link to sibling repo files outside docs_dir (references/, commands/,
# SECURITY.md, .memory-bank/...). Those are real files, just not part of the
# MkDocs docs tree, so `links.not_found` is downgraded to `info` (still
# visible, does not fail --strict). Nav integrity (missing/omitted pages)
# stays at the strict default so a real orphan/missing-nav-target still fails.
validation:
  links:
    not_found: info

nav:
  - Home: README.md
  - Getting Started:
      - Install: install.md
      - Quick Start: quick-start.md
      - Your First Feature: first-feature.md
      - Cross-Agent Setup: cross-agent-setup.md
  - Concepts:
      - Overview: concepts/overview.md
      - Memory Bank Layout: concepts/memory-bank-layout.md
      - Engineering Rules: concepts/rules.md
      - Code Graph & Semantic Search: concepts/code-graph.md
      - Session Memory: concepts/session-memory.md
      - Spec-Driven Development: concepts/sdd.md
  - Guides:
      - /mb work: mb-work.md
      - Reviewer 2.0: reviewer-2.md
      - Coordination Board: coordination.md
      - Rule Profiles: rule-profiles.md
      - i18n: i18n.md
      - Updating: updating.md
      - Cursor Extension: cursor-extension.md
      - Handoff 2.0: handoff-2.0.md
  - Reference:
      - Commands: commands.md
      - Agents Reference: agents-reference.md
      - Environment Variables: environment-variables.md
      - pipeline.yaml Schema: pipeline-yaml.md
      - Hooks: hooks.md
  - Operations:
      - Release Process: release-process.md
      - Repo Migration: repo-migration.md
      - Troubleshooting: troubleshooting.md
  - Migrations:
      - v4 → v5: MIGRATION-v4-v5.md
      - v3.0 → v3.1: MIGRATION-v3-v3.1.md
      - v1 → v2: MIGRATION-v1-v2.md
      - Install v1 → v2: MIGRATION-install-v1-v2.md
  - Security:
      - Archived Audit (2026-04-21): security/audit-2026-04-21.md
